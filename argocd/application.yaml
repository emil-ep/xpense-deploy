apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xpense-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/emil-ep/xpense-tracker-deploy
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: xpense
  syncPolicy:
    automated:
      prune: true
      selfHeal: true