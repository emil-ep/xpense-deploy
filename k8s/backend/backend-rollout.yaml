apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: xpense-tracker-backend
  namespace: xpense
  labels:
    app: xpense-tracker-backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  
  selector:
    matchLabels:
      app: xpense-tracker-backend

  template:
    metadata:
      labels:
        app: xpense-tracker-backend

    spec:
      containers:
        - name: backend
          image: ghcr.io/emil-ep/xpense-backend:1.0.22
          imagePullPolicy: Always

          ports:
            - containerPort: 8085

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s

          envFrom:
            - configMapRef:
                name: xpense-backend-config
            - secretRef:
                name: xpense-backend-secret

  strategy:
    blueGreen:
      activeService: xpense-tracker-backend-active
      previewService: xpense-tracker-backend-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30

      # ── Post-promotion gate ────────────────────────────────────────────────
      # Runs after the active service switches to green, BEFORE blue is scaled
      # down.  If this fails, Argo reverts the active service back to blue.
      postPromotionAnalysis:
        templates:
          - templateName: instana-bluegreen-health
        args:
          # After promotion "Latest" is still the green (now-active) ReplicaSet.
          - name: pod-template-hash
            valueFrom:
              podTemplateHashValue: Latest
